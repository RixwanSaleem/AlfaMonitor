- name: Verify managed Linux servers
  hosts: all
  gather_facts: false
  tasks:
    - name: Test remote connectivity
      ping:

    - name: Collect OS release
      ansible.builtin.shell: cat /etc/os-release
      register: os_release
      changed_when: false

    - name: Show OS release values
      debug:
        msg: "{{ os_release.stdout_lines }}"
